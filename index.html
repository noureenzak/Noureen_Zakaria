<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noureen Zakaria</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
       background: #ffd2e9;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 22px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    h1 { font-size: 20px; font-weight: 700; color: #111111; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #555555; line-height: 1.6; margin-bottom: 6px; }
    .email-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 2rem; }
    .email-link {
      font-size: 12px;
      color: #999999;
      text-decoration: none;
    }
    .email-link:hover { color: #555; }
    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      color: #bbbbbb;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .copy-btn:hover { color: #555; }
    .copy-btn.copied { color: #22c55e; }
    .links { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1.5px solid #e5e7eb;
      background: #ffffff;
      color: #111111;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #f9fafb; border-color: #d1d5db; }
    .btn svg { flex-shrink: 0; color: #555; }
    .divider { width: 40px; height: 1px; background: #e5e7eb; margin: 1.75rem auto; }
    .footer { font-size: 12px; }
    .footer a { color: #aaaaaa; text-decoration: none; }
    .footer a:hover { color: #666; }
  </style>
</head>
<body>
  <div class="card">

    <div class="avatar">NZ</div>

    <h1>Noureen Zakaria</h1>
    <p class="sub">BSc Software Engineering &mdash; First Class Honours<br>University of Salford</p>

    <div class="email-row">
      <a class="email-link" href="mailto:noureenosama00@gmail.com">noureenosama00@gmail.com</a>
      <button class="copy-btn" id="copyBtn" title="Copy email" onclick="copyEmail()">
        <svg id="copyIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>

    <div class="links">

      <a class="btn" href="https://www.linkedin.com/in/noureen-zakaria/" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect x="2" y="9" width="4" height="12"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
        View LinkedIn
      </a>

      <a class="btn" href="https://drive.google.com/file/d/1vK9o0XJr7Jta9u6Yl4yYANaFP9iubtH-/view?usp=sharing" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        View CV
      </a>

    </div>

    <div class="divider"></div>

    <div class="footer">
      <a href="https://github.com/noureenzak" target="_blank" rel="noopener">GitHub</a>
    </div>

  </div>

  <script>
    function copyEmail() {
      navigator.clipboard.writeText('noureenosama00@gmail.com').then(function() {
        var btn = document.getElementById('copyBtn');
        var icon = document.getElementById('copyIcon');
        btn.classList.add('copied');
        icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
        setTimeout(function() {
          btn.classList.remove('copied');
          icon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
        }, 2000);
      });
    }
  </script>
</body>
</html>
